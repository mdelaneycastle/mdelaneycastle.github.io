<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marvel Mask Filter</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; }
    .stage { position: relative; max-width: 100vw; max-height: 100vh; }
    video, #three {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      transform: scaleX(-1);
    }
    #three { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    /* loading screen */
    #loading {
      position: fixed; inset: 0; z-index: 20;
      background: #000;
      transition: opacity 0.5s ease;
    }
    #loading img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #loading::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8) 100%);
    }
    .loading-bottom {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: min(70%, 360px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }
    .loading-bar {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #e62429;
      box-shadow: 0 0 10px rgba(230, 36, 41, 0.7);
      transition: width 0.35s ease;
    }
    .loading-text {
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    #loading.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* model toggle */
    #model-toggle {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.55);
      padding: 4px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #model-toggle button {
      background: transparent;
      border: 0;
      color: rgba(255,255,255,0.65);
      font: 500 11px/1 system-ui;
      letter-spacing: 0.06em;
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    #model-toggle button:hover { color: #fff; }
    #model-toggle button.is-active {
      background: #e62429;
      color: #fff;
    }

    #back-link {
      position: fixed; bottom: 12px; left: 12px; z-index: 10;
      color: #fff; font: 12px system-ui; text-decoration: none;
      background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 6px;
      backdrop-filter: blur(6px); opacity: 0.7; transition: opacity 0.15s;
    }
    #back-link:hover { opacity: 1; }

    /* mobile (qr) button */
    #qr-button {
      position: fixed; bottom: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.6); color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 10px; border-radius: 6px;
      font: 12px system-ui; cursor: pointer;
      backdrop-filter: blur(6px);
      opacity: 0.7; transition: opacity 0.15s, border-color 0.15s;
    }
    #qr-button:hover { opacity: 1; border-color: #e62429; }

    /* qr fallback overlay */
    #qr-fallback {
      position: fixed; inset: 0; z-index: 25;
      display: grid; place-items: center;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      padding: 16px;
    }
    #qr-fallback[hidden] { display: none; }
    .qr-card {
      position: relative;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 22px 24px 18px;
      text-align: center;
      color: #fff;
      max-width: 100%;
    }
    .qr-eyebrow {
      font: 500 10px/1 system-ui;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #e62429;
      margin: 0 0 6px;
    }
    .qr-title {
      font: 500 14px/1.3 system-ui;
      margin: 0 0 14px;
      max-width: 240px;
    }
    .qr-img {
      display: block;
      width: 180px; height: 180px;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      box-sizing: content-box;
      margin: 0 auto;
    }
    .qr-url {
      font: 11px ui-monospace, monospace;
      color: rgba(255,255,255,0.5);
      margin: 12px 0 0;
    }
    .qr-close {
      position: absolute; top: 8px; right: 10px;
      background: transparent; border: 0;
      color: #fff; font-size: 20px; line-height: 1;
      cursor: pointer; padding: 4px;
      opacity: 0.5; transition: opacity 0.15s;
    }
    .qr-close:hover { opacity: 1; }

    /* mobile: bump UI text sizes */
    @media (max-width: 600px) {
      #back-link { font-size: 15px; padding: 8px 12px; }
      #qr-button { font-size: 15px; padding: 8px 12px; }
      #model-toggle button { font-size: 14px; padding: 10px 18px; }
      .loading-text { font-size: 13px; letter-spacing: 0.2em; }
      .qr-eyebrow { font-size: 12px; }
      .qr-title { font-size: 17px; max-width: 280px; }
      .qr-url { font-size: 13px; }
      .qr-img { width: 220px; height: 220px; }
      .qr-close { font-size: 26px; padding: 6px; }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">
    <img src="/images/marvel-loading.jpg" alt="" />
    <div class="loading-bottom">
      <div class="loading-text" id="loading-text">initialising</div>
      <div class="loading-bar"><div class="loading-bar-fill" id="loading-fill"></div></div>
    </div>
  </div>

  <a id="back-link" href="/">← marcdelaney.co.uk</a>
  <button id="qr-button" type="button">scan for mobile</button>
  <script>
    if (window.self !== window.top) {
      document.getElementById('back-link').style.display = 'none';
    }
  </script>

  <div id="qr-fallback" hidden>
    <div class="qr-card">
      <button class="qr-close" type="button" aria-label="Close">×</button>
      <p class="qr-eyebrow" id="qr-eyebrow">on mobile</p>
      <p class="qr-title" id="qr-title">scan to open the filter on your phone</p>
      <img class="qr-img" src="/images/mask-qr.png" alt="QR code linking to marcdelaney.co.uk/ironman" />
      <p class="qr-url">marcdelaney.co.uk/ironman</p>
    </div>
  </div>

  <div id="model-toggle">
    <button type="button" data-model="ironman" class="is-active">Iron Man</button>
    <button type="button" data-model="spiderman">Spider-Man</button>
  </div>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="three"></canvas>
  </div>
  <script type="module" src="./main.js?v=4"></script>
</body>
</html>
